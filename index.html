<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base Apparel Coming Soon Page</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <section class="hero">
                <div class="hero-content">
                    <div class="content-hero-logo">
                        <img src="./image/logo.svg" alt="Logo">
                    </div>
                    <div class="content-hero-mobile">
                        <img src="./image/hero-mobile.jpg" alt="Hero Mobile">
                    </div>
                    <h1 class="content-hero-title"><span>WE'RE</span> COMING SOON</h1>
                    <p class="content-hero-text">Hello fellow shoppers! We're currently building our new fashion store. Add your email below to stay up-to-date with announcements and our launch deals.</p>
                    <form class="content-hero-form" >
                        <input type="email" class="content-hero" placeholder="Email Address">
                        <button type="submit" class="content-hero-button">
                            <img src="./image/icon-arrow.svg" alt="Icon Arrow">
                        </button>
                    </form>
                    <p class="content-hero-error_message hidden">Please provide a valid email</p>
                </div>
                <div class="hero-image_container">
                    <img src="./image/hero-desktop.jpg" alt="Image Hero">
                </div>
            </section>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
